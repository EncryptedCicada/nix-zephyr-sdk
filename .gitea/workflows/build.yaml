---
name: build
on: push

jobs:
  check:
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Install Nix
      uses: ./.gitea/actions/setup-nix

    - name: Nix check
      run: nix flake check

  build:
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Install Nix
      uses: ./.gitea/actions/setup-nix

    - name: Nix build
      run: nix build .#
